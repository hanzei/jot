version: "2"
run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - bodyclose
    - contextcheck
    - errcheck
    - errorlint
    - exhaustive
    - goconst
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - nilnil
    - nolintlint
    - revive
    - rowserrcheck
    - staticcheck
    - sqlclosecheck
    - unconvert
    - unused
    - testifylint
    - canonicalheader
    - noctx
    - usestdlibvars
    - durationcheck
    - intrange
    - recvcheck
    - gocognit
    - loggercheck
    - prealloc
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    gocyclo:
      min-complexity: 25
    goconst:
      min-len: 2
      min-occurrences: 3
    misspell:
      locale: US
    gocognit:
      min-complexity: 20
    usestdlibvars:
      http-method: true
      http-status-code: true
      http-header: true
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
    testifylint:
      enable:
        - blank-import
        - bool-compare
        - compares
        - contains
        - empty
        - encoded-compare
        - equal-values
        - error-is-as
        - error-nil
        - expected-actual
        - float-compare
        - formatter
        - go-require
        - len
        - negative-positive
        - nil-compare
        - regexp
        - require-error
        - suite-broken-parallel
        - suite-dont-use-pkg
        - suite-extra-assert-call
        - suite-method-signature
        - suite-subtest-run
        - suite-thelper
        - useless-assert

    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write

issues:
  max-issues-per-linter: 0
  max-same-issues: 0