version: "3"

tasks:
  run-server:
    desc: Start the Jot server
    dir: server
    vars:
      COMMIT:
        sh: git rev-parse --short HEAD
      BUILD_TIME:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
    cmds:
      - >
        go build
        -buildvcs=false
        -ldflags "-X 'github.com/hanzei/jot/server/internal/server.commit={{.COMMIT}}'
                  -X 'github.com/hanzei/jot/server/internal/server.version=dev'
                  -X 'github.com/hanzei/jot/server/internal/server.buildTime={{.BUILD_TIME}}'"
        -o jot .
      - ./jot

  run-webapp:
    desc: Build webapp in watch mode
    dir: webapp
    cmd: npm run build:watch

  test:
    desc: Run all tests
    deps: [test-server, test-webapp, test-mobile]

  test-server:
    desc: Run server tests
    dir: server
    cmd: go test -v ./...

  test-webapp:
    desc: Run webapp tests
    dir: webapp
    cmd: npm run test:run

  coverage:
    desc: Run server tests with coverage
    dir: server
    cmd: go test -v -coverprofile=coverage.out ./... && go tool cover -html=coverage.out -o coverage.html

  lint:
    desc: Run linters
    deps: [lint-server, lint-webapp, lint-mobile]

  lint-server:
    desc: Run server linting with golangci-lint
    dir: server
    cmd: golangci-lint run

  lint-webapp:
    desc: Run webapp linting
    dir: webapp
    cmd: npm run lint && npm run lint:ts

  check-translations:
    desc: Check that all locale translation files have the same keys as en.json
    dir: webapp
    cmd: npm run check-translations

  test-e2e:
    desc: Run end-to-end tests
    dir: webapp
    cmd: npm run test:e2e

  test-mobile:
    desc: Run mobile app tests
    dir: mobile
    cmd: npm test -- --ci

  lint-mobile:
    desc: Run mobile app linting
    dir: mobile
    cmd: npm run lint && npm run typecheck

  clean:
    desc: Remove generated files and node packages
    cmds:
      - rm -rf webapp/build webapp/node_modules
      - rm -rf mobile/node_modules
      - rm -f server/jot server/coverage.out server/coverage.html
