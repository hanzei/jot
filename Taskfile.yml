version: "3"

tasks:
  run-server:
    desc: Start the Keep server
    dir: server
    cmd: go run main.go

  run-webapp:
    desc: Build webapp in watch mode
    dir: webapp
    cmd: npm run build:watch

  test:
    desc: Run all tests
    deps: [test-server, test-webapp]

  test-server:
    desc: Run server tests
    dir: server
    cmd: go test -v ./...

  test-webapp:
    desc: Run webapp tests
    dir: webapp
    cmd: echo "not yet implemented"

  coverage:
    desc: Run server tests with coverage
    dir: server
    cmd: go test -v -coverprofile=coverage.out ./... && go tool cover -html=coverage.out -o coverage.html

  lint:
    desc: Run linters
    deps: [lint-server, lint-webapp]

  lint-server:
    desc: Run server linting with golangci-lint
    dir: server
    cmd: golangci-lint run

  lint-webapp:
    desc: Run webapp linting
    dir: webapp
    cmd: npm run lint
