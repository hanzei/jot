apiVersion: 1

# Data source for Jot OTel metrics.
#
# Jot exports metrics via OTLP (gRPC) to an OTel Collector which should forward
# them to a Prometheus-compatible backend (Mimir, VictoriaMetrics, Thanos, or
# plain Prometheus with the OTLP receiver enabled).
#
# Update `url` to point at your backend's query endpoint and adjust `type` if
# you are using a non-Prometheus-compatible backend (e.g. `grafana-mimir`).
#
# Service is identified by the OTel resource attribute `service.name` which
# becomes the `service_name` label in Prometheus-compatible stores.

datasources:
  - name: OTel
    type: prometheus
    uid: otel
    access: proxy
    url: http://prometheus:9090   # replace with your OTel metrics backend URL
    isDefault: true
    jsonData:
      timeInterval: 15s
      httpMethod: POST
