name: Webapp — CI

permissions:
  contents: read

on:
  push:
    branches: ["master"]
  pull_request:
    paths: ["webapp/**", "shared/**", ".github/workflows/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2
        with:
          version: 3.x

      - name: Install dependencies
        working-directory: ./webapp
        run: npm ci

      - name: Run tests
        run: task test-webapp

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2
        with:
          version: 3.x

      - name: Install dependencies
        working-directory: ./webapp
        run: npm ci

      - name: Run linters
        run: task lint-webapp

  translations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2
        with:
          version: 3.x

      - name: Install dependencies
        working-directory: ./webapp
        run: npm ci

      - name: Check translations
        run: task check-translations

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2
        with:
          version: 3.x

      - name: Install dependencies
        working-directory: ./webapp
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./webapp
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: task test-e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: failure()
        with:
          name: playwright-report
          path: webapp/playwright-report/
          retention-days: 7
