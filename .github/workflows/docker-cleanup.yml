name: Docker Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Delete PR image from GitHub Container Registry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TAG: pr-${{ github.event.pull_request.number }}
        run: |
          # Wait for any in-flight docker-merge run to finish before deleting.
          sleep 180

          # Find the package version ID for the PR tag
          PACKAGE_ERR=$(mktemp)
          VERSION_ID=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/users/hanzei/packages/container/jot/versions" \
            2>"$PACKAGE_ERR" | jq -r --arg tag "$PR_TAG" \
            '.[] | select(.metadata.container.tags[] == $tag) | .id' \
            | head -1 || true)

          if [ -s "$PACKAGE_ERR" ]; then
            echo "Warning: gh api package list returned error: $(cat "$PACKAGE_ERR")"
          fi
          rm -f "$PACKAGE_ERR"

          if [ -n "$VERSION_ID" ]; then
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              "/users/hanzei/packages/container/jot/versions/$VERSION_ID"
            echo "Deleted ghcr.io/hanzei/jot:${PR_TAG}"
          else
            echo "No image found for ${PR_TAG}, skipping"
          fi

          # Delete orphaned untagged versions (per-platform manifests pushed by
          # the build job without tags; they become orphaned once the manifest
          # list above is deleted). Since master images go to Docker Hub, every
          # untagged version on ghcr.io is safe to remove.
          UNTAGGED=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/users/hanzei/packages/container/jot/versions" \
            2>/dev/null | jq -r '.[] | select(.metadata.container.tags | length == 0) | .id' || true)

          for ID in $UNTAGGED; do
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              "/users/hanzei/packages/container/jot/versions/$ID"
            echo "Deleted untagged version $ID"
          done
