name: Mobile — APK Build

permissions:
  contents: read

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    paths: ["mobile/**", "shared/**", ".github/workflows/**"]

jobs:
  build-apk:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm ci
        working-directory: ./mobile

      - name: Write google-services.json
        run: echo "$GOOGLE_SERVICES_JSON" > mobile/google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean
        working-directory: ./mobile

      - name: Write keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > ./mobile/android/release.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build release APK
        run: ./gradlew assembleRelease
        working-directory: ./mobile/android
        env:
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: jot-release-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
