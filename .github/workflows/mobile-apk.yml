name: Mobile — APK Build

permissions:
  contents: read

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    paths: ["mobile/**", "shared/**", ".github/workflows/**"]

jobs:
  build-apk:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Pre-install NDK and CMake
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.1.12297006" \
            "cmake;3.22.1"

      - name: Install dependencies
        run: npm ci
        working-directory: ./mobile

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean
        working-directory: ./mobile

      - name: Configure gradle.properties
        run: |
          echo "reactNativeArchitectures=arm64-v8a" >> ./mobile/android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g" >> ./mobile/android/gradle.properties

      - name: Write keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > ./mobile/android/release.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Build release APK
        run: ./gradlew assembleRelease
        working-directory: ./mobile/android
        env:
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: jot-release-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

  release-apk:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build-apk
    permissions:
      contents: write
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: jot-release-apk
          path: ./apk

      - name: Wait for GitHub release and upload APK
        run: |
          for i in 1 2 3 4 5 6; do
            if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
              echo "Release ${{ github.ref_name }} found."
              break
            fi
            echo "Waiting for release ${{ github.ref_name }} to be created (attempt $i/6)..."
            sleep $((i * 10))
          done
          echo "Uploading APK to release ${{ github.ref_name }}..."
          gh release upload "${{ github.ref_name }}" \
            "./apk/app-release.apk#jot-${{ github.ref_name }}.apk" \
            --repo "${{ github.repository }}" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
