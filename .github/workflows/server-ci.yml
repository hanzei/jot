name: Server — CI

permissions:
  contents: read

on:
  push:
    branches: ["master"]
  pull_request:
    paths: ["server/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum

      - name: Install Task
        uses: go-task/setup-task@v1
        with:
          version: 3.x

      - name: Run tests
        run: task test-server

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum

      - name: Install Task
        uses: go-task/setup-task@v1
        with:
          version: 3.x

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: ./server

      - name: Run linters
        run: task lint-server

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@v1.16.6

      - name: Install Task
        uses: go-task/setup-task@v1
        with:
          version: 3.x

      - name: Regenerate docs
        run: task gen-docs

      - name: Check docs are up to date
        run: git diff --exit-code server/docs/

  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check migration numbers are unique
        run: |
          dupes=$(ls server/internal/database/migrations/*.sql \
            | xargs -I{} basename {} \
            | grep -oP '^\d+' \
            | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "Duplicate migration numbers found: $dupes"
            exit 1
          fi
          echo "All migration numbers are unique."
