name: Server — CI

permissions:
  contents: read

on:
  push:
    branches: ["master"]
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"
      - "Taskfile.yml"
      - ".golangci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2
        with:
          version: 3.x

      - name: Run tests
        run: task test-server

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2
        with:
          version: 3.x

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.3

      - name: Run linters
        run: task lint-server

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2
        with:
          version: 3.x

      - name: Regenerate docs
        run: task gen-docs

      - name: Check docs are up to date
        run: git diff --exit-code server/docs/

  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check migration numbers are unique
        run: |
          set -euo pipefail
          dupes=$(ls server/internal/database/migrations/*.sql \
            | xargs -I{} basename {} \
            | grep -oP '^\d+' \
            | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "Duplicate migration numbers found: $dupes"
            exit 1
          fi
          echo "All migration numbers are unique."
