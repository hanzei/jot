name: Server — CI

permissions:
  contents: read

on:
  push:
    branches: ["master"]
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/**"
      - "Taskfile.yml"
      - ".golangci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache-dependency-path: server/go.sum

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2
        with:
          version: 3.x

      - name: Run tests
        run: task test-server

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache-dependency-path: server/go.sum

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2
        with:
          version: 3.x

      - name: Run golangci-lint
        run: task lint-server

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache-dependency-path: server/go.sum

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2
        with:
          version: 3.x

      - name: Regenerate docs
        run: task gen-docs

      - name: Check docs are up to date
        run: git diff --exit-code server/docs/

  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check migration numbers are unique
        run: |
          set -euo pipefail
          for dialect in sqlite postgres; do
            dupes=$(ls server/internal/database/migrations/${dialect}/*.sql \
              | xargs -I{} basename {} \
              | grep -oP '^\d+' \
              | sort | uniq -d)
            if [ -n "$dupes" ]; then
              echo "Duplicate migration numbers found in ${dialect}: $dupes"
              exit 1
            fi
          done
          echo "All migration numbers are unique."
