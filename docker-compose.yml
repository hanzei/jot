version: '3.8'

services:
  jot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jot
    environment:
      - DB_PATH=/data/jot.db
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - STATIC_DIR=/app/webapp/build
    volumes:
      - ./data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  data:
    driver: local