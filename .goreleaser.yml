version: 2

project_name: jot

builds:
  - id: server
    dir: server
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X 'github.com/hanzei/jot/server/internal/server.version={{.Version}}'
      - -X 'github.com/hanzei/jot/server/internal/server.commit={{.ShortCommit}}'
      - -X 'github.com/hanzei/jot/server/internal/server.buildTime={{.Date}}'
    overrides:
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=aarch64-linux-gnu-gcc

  - id: jotctl
    dir: server
    main: ./cmd/jotctl
    binary: jotctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: server
    ids: [server]
    format: tar.gz
  - id: jotctl
    ids: [jotctl]
    name_template: "jotctl_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
