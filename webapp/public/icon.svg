<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="noteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Note paper background -->
  <rect x="12" y="8" width="40" height="48" rx="2" ry="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Note paper folded corner -->
  <path d="M44 8 L44 16 L52 16 Z" fill="#f3f4f6"/>
  <path d="M44 8 L44 16 L52 16 Z" fill="none" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Note lines -->
  <line x1="16" y1="18" x2="44" y2="18" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="16" y1="24" x2="48" y2="24" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="16" y1="30" x2="46" y2="30" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="16" y1="36" x2="48" y2="36" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="16" y1="42" x2="44" y2="42" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Pen -->
  <g transform="translate(28,26) rotate(45)">
    <rect x="0" y="0" width="2" height="14" fill="url(#noteGradient)"/>
    <rect x="0" y="14" width="2" height="2" fill="#374151"/>
    <circle cx="1" cy="-1" r="1" fill="#fbbf24"/>
  </g>
  
  <!-- Subtle shadow -->
  <rect x="14" y="10" width="40" height="48" rx="2" ry="2" fill="none" stroke="#d1d5db" stroke-width="0.5" opacity="0.5"/>
</svg>