basePath: /api/v1
definitions:
  handlers.AddLabelRequest:
    properties:
      name:
        type: string
    type: object
  handlers.AuthResponse:
    properties:
      settings:
        $ref: '#/definitions/models.UserSettings'
      user:
        $ref: '#/definitions/models.User'
    type: object
  handlers.ChangePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        type: string
    type: object
  handlers.CreateNoteItem:
    properties:
      completed:
        type: boolean
      indent_level:
        type: integer
      position:
        type: integer
      text:
        type: string
    type: object
  handlers.CreateNoteRequest:
    properties:
      color:
        type: string
      content:
        type: string
      items:
        items:
          $ref: '#/definitions/handlers.CreateNoteItem'
        type: array
      labels:
        items:
          type: string
        type: array
      note_type:
        $ref: '#/definitions/models.NoteType'
      title:
        type: string
    type: object
  handlers.CreateUserRequest:
    properties:
      password:
        type: string
      role:
        type: string
      username:
        type: string
    type: object
  handlers.EmptyTrashResponse:
    properties:
      deleted:
        type: integer
    type: object
  handlers.ImportResponse:
    properties:
      errors:
        items:
          type: string
        type: array
      imported:
        type: integer
      skipped:
        type: integer
    type: object
  handlers.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  handlers.PaginatedNotesResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/models.Note'
        type: array
      pagination:
        $ref: '#/definitions/handlers.PaginationMetadata'
    type: object
  handlers.PaginatedSessionsResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/handlers.SessionResponse'
        type: array
      pagination:
        $ref: '#/definitions/handlers.PaginationMetadata'
    type: object
  handlers.PaginatedUsersResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/handlers.UserInfo'
        type: array
      pagination:
        $ref: '#/definitions/handlers.PaginationMetadata'
    type: object
  handlers.PaginationMetadata:
    properties:
      has_more:
        type: boolean
      limit:
        type: integer
      next_offset:
        type: integer
      offset:
        type: integer
      returned:
        type: integer
    type: object
  handlers.RegisterRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  handlers.RenameLabelRequest:
    properties:
      name:
        type: string
    type: object
  handlers.ReorderNotesRequest:
    properties:
      note_ids:
        items:
          type: string
        type: array
    type: object
  handlers.SessionResponse:
    properties:
      browser:
        type: string
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: string
      is_current:
        type: boolean
      os:
        type: string
    type: object
  handlers.ShareNoteRequest:
    properties:
      user_id:
        type: string
    type: object
  handlers.ShareNoteResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
    type: object
  handlers.UpdateNoteItem:
    properties:
      assigned_to:
        type: string
      completed:
        type: boolean
      indent_level:
        type: integer
      position:
        type: integer
      text:
        type: string
    type: object
  handlers.UpdateNoteRequest:
    properties:
      archived:
        type: boolean
      checked_items_collapsed:
        type: boolean
      color:
        type: string
      content:
        type: string
      items:
        items:
          $ref: '#/definitions/handlers.UpdateNoteItem'
        type: array
      pinned:
        type: boolean
      title:
        type: string
    type: object
  handlers.UpdateUserRequest:
    properties:
      first_name:
        type: string
      language:
        enum:
        - system
        - en
        - de
        - es
        - fr
        - pt
        - it
        - nl
        - pl
        type: string
      last_name:
        type: string
      note_sort:
        enum:
        - manual
        - updated_at
        - created_at
        type: string
      theme:
        enum:
        - system
        - light
        - dark
        type: string
      username:
        type: string
    type: object
  handlers.UpdateUserRoleRequest:
    properties:
      role:
        type: string
    type: object
  handlers.UserInfo:
    properties:
      first_name:
        type: string
      has_profile_icon:
        type: boolean
      id:
        type: string
      last_name:
        type: string
      role:
        type: string
      username:
        type: string
    type: object
  handlers.UserListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/models.User'
        type: array
      pagination:
        $ref: '#/definitions/handlers.PaginationMetadata'
    type: object
  models.AdminLabelStats:
    properties:
      note_associations:
        type: integer
      total:
        type: integer
    type: object
  models.AdminNoteStats:
    properties:
      archived:
        type: integer
      text:
        type: integer
      todo:
        type: integer
      total:
        type: integer
      trashed:
        type: integer
    type: object
  models.AdminSharingStats:
    properties:
      share_links:
        type: integer
      shared_notes:
        type: integer
    type: object
  models.AdminStats:
    properties:
      labels:
        $ref: '#/definitions/models.AdminLabelStats'
      notes:
        $ref: '#/definitions/models.AdminNoteStats'
      sharing:
        $ref: '#/definitions/models.AdminSharingStats'
      storage:
        $ref: '#/definitions/models.AdminStorageStats'
      todo_items:
        $ref: '#/definitions/models.AdminTodoItemStats'
      users:
        $ref: '#/definitions/models.AdminUserStats'
    type: object
  models.AdminStorageStats:
    properties:
      database_size_bytes:
        type: integer
    type: object
  models.AdminTodoItemStats:
    properties:
      assigned:
        type: integer
      completed:
        type: integer
      total:
        type: integer
    type: object
  models.AdminUserStats:
    properties:
      total:
        type: integer
    type: object
  models.Label:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.Note:
    properties:
      archived:
        type: boolean
      checked_items_collapsed:
        type: boolean
      color:
        type: string
      content:
        type: string
      created_at:
        type: string
      deleted_at:
        type: string
      id:
        type: string
      is_shared:
        type: boolean
      items:
        items:
          $ref: '#/definitions/models.NoteItem'
        type: array
      labels:
        items:
          $ref: '#/definitions/models.Label'
        type: array
      note_type:
        $ref: '#/definitions/models.NoteType'
      pinned:
        type: boolean
      position:
        type: integer
      shared_with:
        items:
          $ref: '#/definitions/models.NoteShare'
        type: array
      title:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.NoteItem:
    properties:
      assigned_to:
        type: string
      completed:
        type: boolean
      created_at:
        type: string
      id:
        type: string
      indent_level:
        type: integer
      note_id:
        type: string
      position:
        type: integer
      text:
        type: string
      updated_at:
        type: string
    type: object
  models.NoteShare:
    properties:
      created_at:
        type: string
      first_name:
        type: string
      has_profile_icon:
        type: boolean
      id:
        type: string
      last_name:
        type: string
      note_id:
        type: string
      permission_level:
        type: string
      shared_by_user_id:
        type: string
      shared_with_user_id:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  models.NoteType:
    enum:
    - text
    - todo
    type: string
    x-enum-varnames:
    - NoteTypeText
    - NoteTypeTodo
  models.User:
    properties:
      created_at:
        type: string
      first_name:
        type: string
      has_profile_icon:
        type: boolean
      id:
        type: string
      last_name:
        type: string
      role:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  models.UserSettings:
    properties:
      language:
        type: string
      note_sort:
        enum:
        - manual
        - updated_at
        - created_at
        type: string
      theme:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  server.aboutResponse:
    properties:
      build_time:
        type: string
      commit:
        type: string
      go_version:
        type: string
      version:
        type: string
    type: object
  server.configResponse:
    properties:
      registration_enabled:
        type: boolean
    type: object
info:
  contact:
    name: Jot Project
    url: https://github.com/hanzei/jot
  description: Self-hosted note-taking application API. Health probes are available
    at root paths `/livez` and `/readyz` (outside `/api/v1`).
  license:
    name: MIT
  title: Jot API
  version: "1.0"
paths:
  /about:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.aboutResponse'
      security:
      - CookieAuth: []
      summary: Get server version and build info
      tags:
      - system
  /admin/stats:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AdminStats'
        "401":
          description: unauthorized
          schema:
            type: string
        "403":
          description: forbidden
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      security:
      - CookieAuth: []
      summary: Get admin system stats (admin only)
      tags:
      - admin
  /admin/users:
    get:
      parameters:
      - description: Page size (default 50, max 100)
        in: query
        name: limit
        type: integer
      - description: Page offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.UserListResponse'
        "400":
          description: bad request
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "403":
          description: forbidden
          schema:
            type: string
      security:
      - CookieAuth: []
      summary: List all users (admin only)
      tags:
      - admin
    post:
      consumes:
      - application/json
      parameters:
      - description: New user details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: bad request
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "403":
          description: forbidden
          schema:
            type: string
        "409":
          description: username already taken
          schema:
            type: string
      security:
      - CookieAuth: []
      summary: Create a user (admin only)
      tags:
      - admin
  /admin/users/{id}:
    delete:
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: no content
        "401":
          description: unauthorized
          schema:
            type: string
        "403":
          description: forbidden
          schema:
            type: string
        "404":
          description: user not found
          schema:
            type: string
        "409":
          description: cannot demote the last admin
          schema:
            type: string
      security:
      - CookieAuth: []
      summary: Delete a user (admin only)
      tags:
      - admin
  /admin/users/{id}/role:
    put:
      consumes:
      - application/json
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: New role
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateUserRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: bad request
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "403":
          description: forbidden
          schema:
            type: string
        "404":
          description: user not found
          schema:
            type: string
        "409":
          description: cannot demote the last admin
          schema:
            type: string
      security:
      - CookieAuth: []
      summary: Update a user's role (admin only)
      tags:
      - admin
  /config:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.configResponse'
      summary: Get public server configuration
      tags:
      - system
  /labels:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Label'
            type: array
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      security:
      - CookieAuth: []
      summary: List all labels for the current user
      tags:
      - labels
  /labels/{id}:
    delete:
      parameters:
      - description: Label ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: unauthorized
          schema:
            type: string
        "404":
          description: label not found
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      security:
      - CookieAuth: []
      summary: Delete a label
      tags:
      - labels
    patch:
      consumes:
      - application/json
      parameters:
      - description: Label ID
        in: path
        name: id
        required: true
        type: string
      - description: New label name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.RenameLabelRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Label'
        "400":
          description: bad request
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "404":
          description: label not found
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      security:
      - CookieAuth: []
      summary: Rename a label
      tags:
      - labels
  /login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AuthResponse'
        "400":
          description: missing username or password
          schema:
            type: string
        "401":
          description: invalid username or password
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      summary: Authenticate a user
      tags:
      - auth
  /logout:
    post:
      responses:
        "204":
          description: no content
        "500":
          description: internal server error
          schema:
            type: string
      security:
      - CookieAuth: []
      summary: Log out the current user
      tags:
      - auth
  /me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AuthResponse'
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      security:
      - CookieAuth: []
      summary: Get the current authenticated user and settings
      tags:
      - auth
  /notes:
    get:
      parameters:
      - description: Return archived notes
        in: query
        name: archived
        type: boolean
      - description: Return trashed notes
        in: query
        name: trashed
        type: boolean
      - description: Full-text search query
        in: query
        name: search
        type: string
      - description: Filter by label ID
        in: query
        name: label
        type: string
      - description: Return only notes with todos assigned to current user
        in: query
        name: my_todo
        type: boolean
      - description: Page size (default 50, max 100)
        in: query
        name: limit
        type: integer
      - description: Page offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.PaginatedNotesResponse'
        "400":
          description: bad request
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      security:
      - CookieAuth: []
      summary: List notes for the current user
      tags:
      - notes
    post:
      consumes:
      - application/json
      parameters:
      - description: Note to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateNoteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Note'
        "400":
          description: bad request
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      security:
      - CookieAuth: []
      summary: Create a new note
      tags:
      - notes
  /notes/{id}:
    delete:
      parameters:
      - description: Note ID
        in: path
        name: id
        required: true
        type: string
      - description: Permanently delete from trash instead of soft-deleting
        in: query
        name: permanent
        type: boolean
      responses:
        "204":
          description: no content
        "400":
          description: bad request
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "404":
          description: not found
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      security:
      - CookieAuth: []
      summary: Delete a note (move to trash, or permanently delete)
      tags:
      - notes
    get:
      parameters:
      - description: Note ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Note'
        "400":
          description: bad request
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "404":
          description: not found
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      security:
      - CookieAuth: []
      summary: Get a single note by ID
      tags:
      - notes
    patch:
      consumes:
      - application/json
      parameters:
      - description: Note ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateNoteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Note'
        "400":
          description: bad request
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "404":
          description: not found
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      security:
      - CookieAuth: []
      summary: Update a note
      tags:
      - notes
  /notes/{id}/duplicate:
    post:
      parameters:
      - description: Note ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Note'
        "400":
          description: bad request
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "404":
          description: not found
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      security:
      - CookieAuth: []
      summary: Duplicate an existing note
      tags:
      - notes
  /notes/{id}/labels:
    post:
      consumes:
      - application/json
      parameters:
      - description: Note ID
        in: path
        name: id
        required: true
        type: string
      - description: Label name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.AddLabelRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Note'
        "400":
          description: bad request
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "403":
          description: no access to note
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      security:
      - CookieAuth: []
      summary: Add a label to a note
      tags:
      - labels
  /notes/{id}/labels/{label_id}:
    delete:
      parameters:
      - description: Note ID
        in: path
        name: id
        required: true
        type: string
      - description: Label ID
        in: path
        name: label_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Note'
        "401":
          description: unauthorized
          schema:
            type: string
        "403":
          description: no access to note
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      security:
      - CookieAuth: []
      summary: Remove a label from a note
      tags:
      - labels
  /notes/{id}/restore:
    post:
      parameters:
      - description: Note ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Note'
        "400":
          description: bad request
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "404":
          description: not found
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      security:
